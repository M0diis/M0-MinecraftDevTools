plugins {
    id 'fabric-loom' version "${loom_version}"
    id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    mavenCentral()
    // JitPack hosts several GitHub-built artifacts (e.g. com.github.kdl-org:kdl4j)
    maven {
        url = uri('https://jitpack.io')
    }

    maven {
        name = 'Modrinth'
        url = 'https://api.modrinth.com/maven'
    }

    maven {
        url = 'https://maven.wispforest.io/releases/'
    }

    maven {
        url = "https://maven.terraformersmc.com/releases/"
    }

    exclusiveContent {
        forRepository {
            maven {
                name = "Modrinth"
                url = "https://api.modrinth.com/maven"
            }
        }
        filter {
            includeGroup "maven.modrinth"
        }
    }
}

configurations {
    common
    shadowCommon // Don't use shadow from the shadow plugin since it *excludes* files.
    compileClasspath.extendsFrom common
    runtimeClasspath.extendsFrom common
    developmentFabric.extendsFrom common
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
    modImplementation "maven.modrinth:midnightlib:${project.midnightlib_version}"
    modImplementation "io.wispforest:owo-lib:${project.owo_version}"
    include "io.wispforest:owo-sentinel:${project.owo_version}"

    compileOnly "org.projectlombok:lombok:${project.lombok_version}"
    annotationProcessor "org.projectlombok:lombok:${project.lombok_version}"

    modImplementation 'org.codehaus.groovy:groovy:3.0.21'
    include 'org.codehaus.groovy:groovy:3.0.21'

    modImplementation("org.jetbrains.kotlin:kotlin-scripting-jsr223:1.9.22")
    modImplementation("eu.jrie.jetbrains:kotlin-shell-core:0.2.1")

    include "org.jetbrains.kotlin:kotlin-scripting-jsr223:1.9.22"
    include "eu.jrie.jetbrains:kotlin-shell-core:0.2.1"

    modImplementation "org.jetbrains.kotlin:kotlin-compiler-embeddable:1.9.22"
    modImplementation "org.jetbrains.kotlin:kotlin-scripting-compiler-embeddable:1.9.22"
    include "org.jetbrains.kotlin:kotlin-compiler-embeddable:1.9.22"
    include "org.jetbrains.kotlin:kotlin-scripting-compiler-embeddable:1.9.22"

    testImplementation platform("org.junit:junit-bom:5.12.2")
    testImplementation "org.junit.jupiter:junit-jupiter"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

loom {
    mixin {
        useLegacyMixinAp = true
        defaultRefmapName = "m0dev.refmap.json"
    }

    runs {
        client {
            programArgs "--username", "M0dii"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

java {
    // Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
    // if it is present.
    // If you remove this line, sources will not be generated.
    withSourcesJar()

    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.base.archivesName.get()}" }
    }
}

loom {
    accessWidenerPath = file("src/main/resources/m0dev.accesswidener")
}
